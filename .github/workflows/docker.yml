name: Branch build

on:
  push:
    branches-ignore: [main]

jobs:
  build:
    name: Build branch image
    runs-on: ubuntu-latest
    permissions:
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Sanitize branch name
        id: branch
        run: echo "tag=$(echo '${{ github.ref_name }}' | sed 's|/|-|g')" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.branch.outputs.tag }}-dev
          tags: |
            bellamy/scrob:${{ steps.branch.outputs.tag }}
            ghcr.io/ellite/scrob:${{ steps.branch.outputs.tag }}
          cache-from: type=gha,scope=scrob-${{ steps.branch.outputs.tag }}
          cache-to: type=gha,mode=max,scope=scrob-${{ steps.branch.outputs.tag }}

      - name: Build and push omnibus
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.omnibus
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            APP_VERSION=${{ steps.branch.outputs.tag }}-dev
          tags: |
            bellamy/scrob:${{ steps.branch.outputs.tag }}-omnibus
            ghcr.io/ellite/scrob:${{ steps.branch.outputs.tag }}-omnibus
          cache-from: type=gha,scope=scrob-omnibus-${{ steps.branch.outputs.tag }}
          cache-to: type=gha,mode=max,scope=scrob-omnibus-${{ steps.branch.outputs.tag }}
